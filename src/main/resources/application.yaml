spring:
  application:
    name: trading-tournament
  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Kolkata

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  cache:
    type: caffeine

  mail:
    host: smtp.gmail.com
    port: 587
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope: user:email, read:user
            redirect-uri: "http://localhost:8080/login/oauth2/callback/github"
        provider:
          github:
            user-info-uri: https://api.github.com/user
            user-name-attribute: id

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry-ms: ${JWT_ACCESS_TOKEN_EXPIRY_MS}
    refresh-token-expiry-days: ${JWT_REFRESH_TOKEN_EXPIRY_DAYS}
  frontend-url: ${APP_FRONTEND_URL}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
  oauth2:
    authorized-redirect-uris:
      - http://localhost:5173/oauth2/success
  finnhub:
    api-key: ${FINNHUB_API_KEY}
    base-url: https://finnhub.io/api/v1

  mail:
    from-address: noreply@tradingtournament.com
    from-name: Trading Tournament Platform
    frontend-base-url: http://localhost:5173

  rate-limit:
    login-max-attempts: 5
    resend-verification-max-attempts: 3
    trade-max-per-minute: 10

  scheduler:
    tournament-lifecycle-ms: 60000
    leaderboard-refresh-ms: 60000
    stock-price-refresh-ms: 30000
    token-cleanup-ms: 86400000

  env:
    type: ${ENV}

server:
  port: 8080
  servlet:
    context-path: /api/v1
  error:
    include-message: never
    include-stacktrace: never
    whitelabel:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health, info

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId}] %-5level %logger{36} - %msg%n"
  level:
    root: WARN
    com.app.tradingtournament: INFO

---
spring:
  config:
    activate:
      on-profile: dev

  jackson:
    deserialization:
      adjust-dates-to-context-time-zone: false
    time-zone: Asia/Kolkata

  datasource:
    url: jdbc:postgresql://localhost:5432/trading_tournament_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    show-sql: true

  mail:
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}

logging:
  level:
    com.app.tradingtournament: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

resilience4j:
  circuitbreaker:
    instances:
      finnhub:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-type: COUNT_BASED
  retry:
    instances:
      finnhub:
        max-attempts: 3
        wait-duration: 1s
        exponential-backoff-multiplier: 2

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://localhost:5432/trading_tournament_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate

  mail:
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}

app:
  cors:
    allowed-origins:
      - ${FRONTEND_URL}
  mail:
    frontend-base-url: ${FRONTEND_URL}
  oauth2:
    authorized-redirect-uris:
      - ${FRONTEND_URL}/oauth2/success

logging:
  level:
    com.app.tradingtournament: INFO
    root: ERROR

resilience4j:
  circuitbreaker:
    instances:
      finnhub:
        sliding-window-size: 20
        minimum-number-of-calls: 10
        wait-duration-in-open-state: 30s
        failure-rate-threshold: 50
  retry:
    instances:
      finnhub:
        max-attempts: 3
        wait-duration: 2s